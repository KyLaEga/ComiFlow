name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to upload releases

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Android
        run: npx cap sync

      - name: Make Gradle Executable
        run: chmod +x android/gradlew

      - name: Build APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Rename APK for Release
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/ComiFlow.apk

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComiFlow-Debug-APK
          path: android/app/build/outputs/apk/debug/ComiFlow.apk

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'ComiFlow Latest Build' }}
          body: |
            Автоматическая сборка приложения ComiFlow.
            
            **Последний коммит:** `${{ github.event.head_commit.message }}`
            **Дата сборки:** ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: android/app/build/outputs/apk/debug/ComiFlow.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
